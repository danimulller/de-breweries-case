version: "3.8"

x-airflow-common: &airflow-common
  image: de-breweries/airflow:latest
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./src:/opt/airflow/src
    - ./tests:/opt/airflow/tests
    - ./conftest.py:/opt/airflow/conftest.py
  depends_on:
    postgres:
      condition: service_healthy
  build: .

services:
  postgres:
    image: postgres:15
    container_name: postgres_airflow
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio_local
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    user: root
    entrypoint: /bin/bash
    env_file:
      - .env
    command:
      - -c
      - |
        chown -R 50000:0 /opt/airflow/logs && \
        chmod -R 775 /opt/airflow/logs && \
        su airflow -c "airflow db migrate" && \
        su airflow -c "airflow users create \
          --username ${AIRFLOW_ROOT_USER} \
          --password ${AIRFLOW_ROOT_PASSWORD} \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data: